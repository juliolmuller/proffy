packages:
  - mobile/
  - server/
  - web/

minimumReleaseAge: 720

allowBuilds:
  '@parcel/watcher': false
  '@prisma/client': true
  '@prisma/engines': true
  better-sqlite3: true
  esbuild: true
  msgpackr-extract: true
  prisma: true
  sharp: true

overrides:
  '@hono/node-server@<1.19.13': ^1.19.13
  'postcss@<8.5.10': ^8.5.10
  'uuid@<11.1.1': ^11.1.1
